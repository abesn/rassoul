# DigitalOcean App Platform spec for rassoul.org
#
# Deploy:
#   doctl apps create --spec .do/app.yaml
# Or update an existing app:
#   doctl apps update <app-id> --spec .do/app.yaml
#
# UI alternative: https://cloud.digitalocean.com/apps/new
#   Connect repo abesn/rassoul, branch main, App Platform auto-detects this file.
#
# Single Node service running `next start`. Static pages are still served as
# static HTML internally (cached by Next.js). API routes (/api/chat,
# /api/donate/*) run as serverful endpoints.
#
# Set the SECRET envs in the App Platform UI after creation:
#   Settings → App-Level Environment Variables → Edit
# (Don't commit them here — values shown as ${...} are placeholders.)

name: rassoul
region: nyc

services:
  - name: web
    github:
      repo: abesn/rassoul
      branch: main
      deploy_on_push: true

    build_command: npm install && npm run build
    run_command: npm start

    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mo, 512MB RAM, 1 vCPU shared
    http_port: 3000

    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3

    envs:
      # ---- non-secret ----
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: NEXT_PUBLIC_SITE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://rassoul.org

      # Soft-launch flag: leave commented to keep the chat hidden behind ?chat=1.
      # Uncomment to expose the widget publicly.
      # - key: NEXT_PUBLIC_CHAT_PUBLIC
      #   scope: RUN_AND_BUILD_TIME
      #   value: "1"

      # Free chat questions per IP per day (default 5)
      # - key: CHAT_FREE_DAILY_LIMIT
      #   scope: RUN_TIME
      #   value: "5"

      # ---- LLM provider ----
      # Set to "deepseek" to route both generator and chatbot through
      # DeepSeek (~60x cheaper). Set to "anthropic" to use Claude.
      - key: LLM_PROVIDER
        scope: RUN_AND_BUILD_TIME
        value: anthropic

      # ---- secrets: set the actual values in the App Platform UI ----
      # Only ONE of the two provider keys must be set — the one matching LLM_PROVIDER.
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DEEPSEEK_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SUNNAH_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: UPSTASH_REDIS_REST_URL
        scope: RUN_TIME
        type: SECRET
      - key: UPSTASH_REDIS_REST_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: DONOR_COOKIE_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET

domains:
  - domain: rassoul.org
    type: PRIMARY
  - domain: www.rassoul.org
    type: ALIAS

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
