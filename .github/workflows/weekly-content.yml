name: Weekly content generation

on:
  schedule:
    # Every Monday 06:00 UTC = 02:00 ET = 22:00 PT Sun
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      posts_per_run:
        description: "How many posts to generate this run"
        required: false
        default: "2"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --no-audit --no-fund

      - name: Generate weekly content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUNNAH_API_KEY: ${{ secrets.SUNNAH_API_KEY }}
          POSTS_PER_RUN: ${{ inputs.posts_per_run || '2' }}
          CLAUDE_MODEL: claude-opus-4-7
        run: npm run generate:weekly

      - name: Open PR with generated content
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/weekly-content
          commit-message: "content: weekly auto-generated posts"
          title: "Weekly da'wah content — ${{ github.run_id }}"
          body: |
            Auto-generated posts for this week.

            **Reviewer checklist:**
            - [ ] Skim each new MDX file for accuracy and tone
            - [ ] Verify all `<Citation>` links resolve to the right source
            - [ ] Check `topics.csv` for any rows now marked `needs_review`
            - [ ] Merge if everything checks out — DO will redeploy automatically
          delete-branch: true
          add-paths: |
            content/posts/**
            content/topics.csv
