name: Daily content generation

on:
  schedule:
    # Every day 06:00 UTC = 02:00 ET = 23:00 PT prior day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      clusters:
        description: "Optional comma-separated clusters to limit this run (e.g. duas,sirah). Empty = all 10."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --no-audit --no-fund

      - name: Generate today's content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUNNAH_API_KEY: ${{ secrets.SUNNAH_API_KEY }}
          CLUSTERS_TODAY: ${{ inputs.clusters }}
          CLAUDE_MODEL: claude-opus-4-7
        run: npm run generate:daily

      - name: Open PR with generated content
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/daily-content
          commit-message: "content: daily auto-generated posts"
          title: "Daily da'wah content — ${{ github.run_id }}"
          body: |
            Auto-generated posts for today, one per cluster (up to 10).

            **Reviewer checklist:**
            - [ ] Skim each new MDX file for accuracy and tone
            - [ ] Verify all `<Citation>` links resolve to the right source
            - [ ] Check `topics.csv` for any rows now marked `needs_review`
            - [ ] Merge if everything checks out — DO will redeploy automatically

            If a cluster shows up as `needs_review`, its citations couldn't be
            matched against the fetched primary sources. Read those before
            merging (or drop the file).
          delete-branch: true
          add-paths: |
            content/posts/**
            content/topics.csv
