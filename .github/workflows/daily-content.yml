name: Daily content generation

on:
  schedule:
    # Every day 06:00 UTC = 02:00 ET = 23:00 PT prior day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      clusters:
        description: "Optional comma-separated clusters to limit this run (e.g. duas,sirah). Empty = all 10."
        required: false
        default: ""
      auto_merge:
        description: "Auto-merge if all posts pass citation validation"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --no-audit --no-fund

      - name: Generate today's content
        id: gen
        env:
          # Pick the provider. "anthropic" | "deepseek"
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUNNAH_API_KEY: ${{ secrets.SUNNAH_API_KEY }}
          CLUSTERS_TODAY: ${{ inputs.clusters }}
          CLAUDE_MODEL: claude-opus-4-7
          DEEPSEEK_MODEL: deepseek-chat
        run: npm run generate:daily

      - name: Open PR with generated content
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/daily-content
          commit-message: "content: daily auto-generated posts"
          title: "Daily da'wah content — ${{ github.run_id }}"
          body: |
            Auto-generated posts for today, one per cluster (up to 10).

            **Generation summary**
            - Published (validated): ${{ steps.gen.outputs.published || '0' }}
            - Needs review (unverified citations): ${{ steps.gen.outputs.needs_review || '0' }}
            - Failed (API errors): ${{ steps.gen.outputs.failed || '0' }}
            - Clusters skipped (no pending topics): ${{ steps.gen.outputs.skipped || '0' }}

            **Auto-merge policy:** this PR auto-merges when `needs_review = 0` AND `failed = 0`.
            Any non-zero count above keeps this PR open for manual review.

            **If open for review, checklist:**
            - [ ] Skim each new MDX file for accuracy and tone
            - [ ] Verify all `<Citation>` links resolve to the right source
            - [ ] Check `topics.csv` for rows now marked `needs_review`
            - [ ] Merge if everything checks out
          delete-branch: true
          add-paths: |
            content/posts/**
            content/topics.csv

      - name: Auto-merge if within quality threshold
        if: >
          steps.pr.outputs.pull-request-number
          && steps.gen.outputs.failed == '0'
          && (fromJSON(steps.gen.outputs.needs_review) <= fromJSON(vars.MAX_NEEDS_REVIEW_TO_MERGE || '2'))
          && (inputs.auto_merge == null || inputs.auto_merge == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Passing threshold: ${{ steps.gen.outputs.published }} published, ${{ steps.gen.outputs.needs_review }} flagged (≤ ${{ vars.MAX_NEEDS_REVIEW_TO_MERGE || '2' }} allowed). Auto-merging."
          gh pr merge ${{ steps.pr.outputs.pull-request-number }} \
            --repo ${{ github.repository }} \
            --squash --delete-branch

      - name: Report manual-review needed
        if: >
          steps.pr.outputs.pull-request-number
          && (fromJSON(steps.gen.outputs.needs_review) > fromJSON(vars.MAX_NEEDS_REVIEW_TO_MERGE || '2') || steps.gen.outputs.failed != '0')
        run: |
          echo "PR left open for manual review:"
          echo "  published    = ${{ steps.gen.outputs.published }}"
          echo "  needs_review = ${{ steps.gen.outputs.needs_review }}  (threshold: ${{ vars.MAX_NEEDS_REVIEW_TO_MERGE || '2' }})"
          echo "  failed       = ${{ steps.gen.outputs.failed }}"
          echo "  URL          = ${{ steps.pr.outputs.pull-request-url }}"
