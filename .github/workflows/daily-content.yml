name: Daily content generation

on:
  schedule:
    # Every day 06:00 UTC = 02:00 ET = 23:00 PT prior day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      clusters:
        description: "Optional comma-separated clusters to limit this run (e.g. duas,sirah). Empty = all 10."
        required: false
        default: ""
      auto_merge:
        description: "Auto-merge if all posts pass validation and site builds"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install --no-audit --no-fund

      - name: Generate today's content
        id: gen
        env:
          # Pick the provider. "anthropic" | "deepseek"
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUNNAH_API_KEY: ${{ secrets.SUNNAH_API_KEY }}
          CLUSTERS_TODAY: ${{ inputs.clusters }}
          CLAUDE_MODEL: claude-opus-4-7
          DEEPSEEK_MODEL: deepseek-chat
        run: npm run generate:daily

      # Compile the site with today's newly-generated MDX. If any file breaks
      # prerender, parse the offending route from the log, DELETE that file,
      # and retry. This means a single bad MDX file no longer strands the
      # entire batch — the broken file is dropped, the rest ship.
      #
      # We cap retries so a systemic problem still surfaces. `continue-on-error`
      # lets the workflow move on either way, and the auto-merge step below
      # checks build_check.outcome + quarantined count.
      - name: Verify site builds; auto-quarantine broken files
        id: build_check
        continue-on-error: true
        run: |
          set +e
          quarantined_files=""
          for attempt in 1 2 3 4 5; do
            echo "::group::next build (attempt $attempt)"
            npm run build > build.log 2>&1
            code=$?
            cat build.log
            echo "::endgroup::"
            if [ $code -eq 0 ]; then
              echo "Build passed on attempt $attempt"
              echo "quarantined=${quarantined_files# }" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Parse "prerendering page \"/cluster/slug\"" from Next's error line.
            broken_route=$(grep -oE 'prerendering page "[^"]+"' build.log | head -1 | sed 's/prerendering page "\(.*\)"/\1/')
            if [ -z "$broken_route" ]; then
              echo "Build failed but couldn't identify a broken page — bailing"
              exit 1
            fi
            file="content/posts${broken_route}.mdx"
            if [ ! -f "$file" ]; then
              echo "Route $broken_route resolved to non-existent file $file — bailing"
              exit 1
            fi
            echo "Quarantining broken file: $file"
            rm "$file"
            quarantined_files="$quarantined_files $file"
          done
          echo "Build still failing after 5 quarantine attempts — bailing"
          echo "quarantined=${quarantined_files# }" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Open PR with generated content
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/daily-content
          commit-message: "content: daily auto-generated posts"
          title: "Daily da'wah content — ${{ github.run_id }}"
          body: |
            Auto-generated posts for today, one per cluster (up to 10).

            **Generation summary**
            - Published (validated): ${{ steps.gen.outputs.published || '0' }}
            - Needs review (unverified citations): ${{ steps.gen.outputs.needs_review || '0' }}
            - Failed (API errors): ${{ steps.gen.outputs.failed || '0' }}
            - Clusters skipped (no pending topics): ${{ steps.gen.outputs.skipped || '0' }}
            - Site build check: **${{ steps.build_check.outcome }}**
            - Quarantined (deleted due to broken MDX): `${{ steps.build_check.outputs.quarantined || 'none' }}`

            **Auto-merge policy:** this PR auto-merges when all of these are true:
            - `needs_review` ≤ `MAX_NEEDS_REVIEW_TO_MERGE` (default 2)
            - `failed = 0`
            - `next build` succeeds against the generated content

            If any condition fails the PR is held for manual review.

            **If open for review, checklist:**
            - [ ] Skim each new MDX file for accuracy and tone
            - [ ] Verify all `<Citation>` links resolve to the right source
            - [ ] Check `topics.csv` for rows now marked `needs_review`
            - [ ] If the build check failed, look at the run log for the specific
                  file that broke and either delete it or fix the MDX
            - [ ] Merge if everything checks out
          delete-branch: true
          add-paths: |
            content/posts/**
            content/topics.csv

      - name: Auto-merge if within quality threshold
        if: >
          steps.pr.outputs.pull-request-number
          && steps.gen.outputs.failed == '0'
          && (fromJSON(steps.gen.outputs.needs_review) <= fromJSON(vars.MAX_NEEDS_REVIEW_TO_MERGE || '2'))
          && steps.build_check.outcome == 'success'
          && (inputs.auto_merge == null || inputs.auto_merge == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "All gates passed:"
          echo "  published    = ${{ steps.gen.outputs.published }}"
          echo "  needs_review = ${{ steps.gen.outputs.needs_review }}  (threshold: ${{ vars.MAX_NEEDS_REVIEW_TO_MERGE || '2' }})"
          echo "  failed       = 0"
          echo "  build_check  = success"
          echo "Auto-merging PR ${{ steps.pr.outputs.pull-request-number }}."
          gh pr merge ${{ steps.pr.outputs.pull-request-number }} \
            --repo ${{ github.repository }} \
            --squash --delete-branch

      - name: Report manual-review needed
        if: >
          steps.pr.outputs.pull-request-number
          && (
            fromJSON(steps.gen.outputs.needs_review) > fromJSON(vars.MAX_NEEDS_REVIEW_TO_MERGE || '2')
            || steps.gen.outputs.failed != '0'
            || steps.build_check.outcome != 'success'
          )
        run: |
          echo "PR left open for manual review:"
          echo "  published    = ${{ steps.gen.outputs.published }}"
          echo "  needs_review = ${{ steps.gen.outputs.needs_review }}  (threshold: ${{ vars.MAX_NEEDS_REVIEW_TO_MERGE || '2' }})"
          echo "  failed       = ${{ steps.gen.outputs.failed }}"
          echo "  build_check  = ${{ steps.build_check.outcome }}"
          echo "  URL          = ${{ steps.pr.outputs.pull-request-url }}"
